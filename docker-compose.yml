version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8420:8420"
    volumes:
      - flight-data:/app/data
    environment:
      - FLIGHT_RECORDER_DB_PATH=/app/data/traces.db
      - FLIGHT_RECORDER_API_KEY=${FLIGHT_RECORDER_API_KEY:-}
      - FLIGHT_RECORDER_RATE_LIMIT=${FLIGHT_RECORDER_RATE_LIMIT:-100/minute}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  flight-data:
