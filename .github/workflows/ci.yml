name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ./sdk[dev]
      - name: Lint
        run: |
          cd sdk && ruff check .
      - name: Type check
        run: |
          cd sdk && mypy src/ --ignore-missing-imports
      - name: Test
        run: |
          cd sdk && python -m pytest --tb=short -q

  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ./sdk -e ./backend[dev]
      - name: Lint
        run: |
          cd backend && ruff check .
      - name: Type check
        run: |
          cd backend && mypy src/ --ignore-missing-imports
      - name: Test
        run: |
          cd backend && python -m pytest --tb=short -q

  integration:
    runs-on: ubuntu-latest
    needs: [test-sdk, test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e ./sdk -e ./backend[dev]
      - name: Integration tests
        run: |
          python -m pytest tests/ --tb=short -q
